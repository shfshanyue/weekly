<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none" role="img" aria-label="前端开发者技术周刊">
  <!--
    概念：终端 Chevron + 琥珀锚点
    ——————————————————————————————
    两条等宽折线构成 ">" 形，圆头笔划（linecap round, linejoin round）
    笔划宽度 3.5px，精准占满 32px 容器，在 16px 缩放后依然清晰可辨
    琥珀圆点 #d97706 位于折角顶点，充当视觉锚点与品牌强调色
    单色版：去除圆点，改为 #0a0a0b 纯色，完整保留可读性
    ——————————————————————————————
  -->

  <!-- Chevron ">" — 两段折线，线段等长，折角精确为 60° -->
  <polyline
    points="10,6 22,16 10,26"
    stroke="#0a0a0b"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- 琥珀锚点 — 折角顶点处的品牌强调色圆点 -->
  <circle cx="22" cy="16" r="2.5" fill="#d97706" />
</svg>
