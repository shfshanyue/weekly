<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 28" fill="none" aria-label="前端周刊">
  <!--
    前端周刊 Logo Mark — v2
    Concept: "Editorial Stack" — Three horizontal rules of descending width
    evoke newspaper column rules, a curated reading list, and the Chinese
    character strokes of 周/刊. The amber accent dot on the top-left corner
    is the editorial "stamp" — a mark of curation and authority.
    Geometry: built on a 4-unit modular grid. All strokes share identical
    weight (2.5px) for monochrome fidelity at favicon scale.
  -->

  <!-- Amber accent stamp — top-left anchor -->
  <rect x="2" y="2" width="5" height="5" rx="1" fill="#d97706"/>

  <!-- Vertical spine — left edge structural column -->
  <rect x="2" y="10" width="2.5" height="16" rx="1.25" fill="#0a0a0b"/>

  <!-- Line 1 — full width, primary rule -->
  <rect x="7" y="10" width="19" height="2.5" rx="1.25" fill="#0a0a0b"/>

  <!-- Line 2 — 80% width, secondary rule -->
  <rect x="7" y="15.5" width="14" height="2.5" rx="1.25" fill="#0a0a0b"/>

  <!-- Line 3 — 55% width, tertiary rule (detail/muted) -->
  <rect x="7" y="21" width="9" height="2.5" rx="1.25" fill="#0a0a0b"/>
</svg>
