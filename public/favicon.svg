<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!--
    前端周刊 Favicon — v2
    Identical mark to logo.svg, scaled to 32×32 favicon grid.
    Single-color fallback: remove amber rect and replace with #0a0a0b.
  -->

  <!-- Background — warm surface -->
  <rect width="32" height="32" rx="6" fill="#fafaf9"/>

  <!-- Amber accent stamp -->
  <rect x="4" y="4" width="6" height="6" rx="1.5" fill="#d97706"/>

  <!-- Vertical spine -->
  <rect x="4" y="13" width="3" height="15" rx="1.5" fill="#0a0a0b"/>

  <!-- Line 1 — full width -->
  <rect x="10" y="13" width="18" height="3" rx="1.5" fill="#0a0a0b"/>

  <!-- Line 2 — 75% width -->
  <rect x="10" y="19" width="13" height="3" rx="1.5" fill="#0a0a0b"/>

  <!-- Line 3 — 50% width -->
  <rect x="10" y="25" width="8" height="3" rx="1.5" fill="#0a0a0b"/>
</svg>
