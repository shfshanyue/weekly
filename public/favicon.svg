<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none" role="img" aria-label="前端开发者技术周刊">
  <!--
    Favicon 版本：深色圆角正方形底板 + 白色 Chevron + 琥珀锚点
    ——————————————————————————————
    底板：ink #0a0a0b，圆角 7px，贴合 iOS / macOS app icon 规范
    Chevron：纯白 #ffffff，在深色背景上保持最高对比度
    琥珀锚点：#d97706，与亮色版保持品牌一致性
    ——————————————————————————————
  -->

  <!-- 深色圆角背景 -->
  <rect width="32" height="32" rx="7" fill="#0a0a0b" />

  <!-- Chevron ">" — 白色，与底板形成强对比 -->
  <polyline
    points="10,6 22,16 10,26"
    stroke="#ffffff"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- 琥珀锚点 -->
  <circle cx="22" cy="16" r="2.5" fill="#d97706" />
</svg>
